<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Feirinha Virtual Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <h1>🍎 Feirinha Virtual 🥦</h1>
            <button id="btn-dark-mode" onclick="alternarModoEscuro()">🌙 Modo Escuro</button>
        </div>
        <p>Escolha seus produtos frescos abaixo!</p>
        
        <div class="busca-container">
            <input type="text" id="barra-busca" oninput="filtrarProdutos()" placeholder="🔍 Digite para buscar um produto...">
        </div>
    </header>

    <main class="container">
        <section class="produtos">
            <h2>Produtos Disponíveis</h2>
            <div class="lista-produtos" id="vitrine-produtos">
                </div>
        </section>

        <section class="carrinho">
            <h2>Seu Carrinho</h2>
            <ul id="itens-carrinho">
                </ul>
            
            <div class="cupom-container">
                <input type="text" id="input-cupom" placeholder="Cupom (Ex: FEIRA10)">
                <button onclick="aplicarCupom()">Aplicar</button>
            </div>
            <p id="msg-cupom"></p>

            <div class="total">
                <div id="desconto-linha" style="display: none; color: #8e24aa; font-size: 0.9em; margin-bottom: 5px;">
                    Desconto: -R$ <span id="valor-desconto">0,00</span>
                </div>
                <strong>Total: R$ <span id="valor-total">0,00</span></strong>
            </div>
            <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Pedido</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
